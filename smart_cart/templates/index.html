<!DOCTYPE html>
<html>
<head>
    <title>Smart Cart Checkout</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .container { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        input[type="number"] { width: 50px; padding: 5px; text-align: center; }
        .btn { background-color: #27ae60; color: white; padding: 15px 30px; border: none; font-size: 18px; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        .btn:hover { background-color: #219150; }
        .qr-section { margin-top: 30px; display: none; }
        .loading { display: none; color: #e67e22; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 Smart Cart Kiosk</h1>
    <p>Select your items below:</p>

    <form action="/start_scan" method="post">
        <div class="item-row">
            <span>🥔 Lays Chips (₹20)</span>
            <input type="number" name="qty_0" value="0" min="0">
        </div>
        <div class="item-row">
            <span>🥤 Coca Cola (₹40)</span>
            <input type="number" name="qty_1" value="0" min="0">
        </div>
        <div class="item-row">
            <span>🍪 Oreo Biscuits (₹30)</span>
            <input type="number" name="qty_2" value="0" min="0">
        </div>
        <div class="item-row">
            <span>🍜 Maggi Noodles (₹15)</span>
            <input type="number" name="qty_3" value="0" min="0">
        </div>

        <button type="submit" class="btn" onclick="showLoading()">📸 START SCANNING</button>
    </form>

    <div id="loading-msg" class="loading">
        Scanning Camera... Check the Python Window!
    </div>

    {% if qr_image %}
    <div class="qr-section" style="display: block;">
        <h2>✅ Payment Ready</h2>
        <p>Scan to Pay: <strong>₹{{ total_amount }}</strong></p>
        <img src="{{ qr_image }}" width="250" style="border: 2px solid #333; border-radius: 10px;">
        <br>
        <br>
        <a href="/">Start New Order</a>
    </div>
    {% endif %}

</div>

<script>
    function showLoading() {
        document.getElementById('loading-msg').style.display = 'block';
    }
</script>

</body>
</html>
